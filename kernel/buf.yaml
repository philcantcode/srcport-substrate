# Protobuf-first discipline. `buf lint` keeps the contract clean; `buf breaking`
# is the mechanism that ENFORCES "add, never mutate" — it is what makes this
# core safe to freeze and depend on. Wire it into CI before v1.0.0.
#
#   buf lint
#   buf breaking --against '.git#branch=main'
version: v2
modules:
  - path: contracts/proto
lint:
  use:
    - STANDARD
  except:
    # The Kernel ABI is deliberately a union of the primitive operations and
    # reuses small messages across RPCs (e.g. Run is both the response of
    # StartRun/Commit/GetRun/CancelRun). That reuse is the design — the
    # invariants, not one-message-per-RPC ceremony, are the contract. These
    # STANDARD rules fight that on purpose, so we opt out of them explicitly
    # rather than rename the human-owned surface.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    # SPEC.md names the seam `service Kernel`, not `KernelService`. The name is
    # part of the human-owned contract; we keep it and drop the suffix rule.
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
