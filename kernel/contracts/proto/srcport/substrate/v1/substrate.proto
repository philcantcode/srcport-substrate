// ─────────────────────────────────────────────────────────────────────────
// srcport-substrate — the frozen, domain-neutral microkernel contract.
//
// THIS FILE IS THE CONTRACT. It is the one artifact a human owns and reads.
// Every SDK conforms to it. It defines SEVEN primitives and one ABI, and it
// knows nothing about any domain — no targets, trials, findings, entities,
// terrain, or content. All of that is a Module built ON TOP of this.
//
// Artifacts are trait bundles: a value is a set of contract-typed traits that
// travel together. Ports require (or guarantee) trait sets; satisfaction is
// structural inclusion. Projection isolates one trait or a subset.
//
// Evolve by ADDING, never by mutating or renumbering a field. See SPEC.md.
// ─────────────────────────────────────────────────────────────────────────

syntax = "proto3";

package srcport.substrate.v1;

// ─── 1. MODULE ─────────────────────────────────────────────────────────────
// A self-contained vertical slice. It declares what it provides and requires;
// it never imports another module. Lifecycle: REGISTERED → LOADED → ACTIVE →
// DEACTIVATED.

enum Lifecycle {
  LIFECYCLE_UNSPECIFIED = 0;
  LIFECYCLE_REGISTERED  = 1;
  LIFECYCLE_LOADED      = 2;
  LIFECYCLE_ACTIVE      = 3;
  LIFECYCLE_DEACTIVATED = 4;
}

// How often a capability's nodes may fire within one Run. Module-owned default
// set at Register; a Run may override per node via ExecutionPolicy.
// Unspecified resolves to FIRING_ONCE (v1.0 converge semantics).
enum Firing {
  FIRING_UNSPECIFIED  = 0;
  FIRING_ONCE         = 1;  // at most one work unit per node per run
  FIRING_ALWAYS       = 2;  // re-fire when input delivery generation changes
  FIRING_ONCE_PER_KEY = 3;  // at most one work unit per (node, input_key) per run
}

// A named thing a module can do. Typed I/O is declared exclusively on ports —
// modules couple through Port.traits contract refs, never through each other's
// code.
message Capability {
  string name = 1;  // e.g. "recon.scan"
  reserved 2;
  reserved "contract";
  repeated Port inputs  = 3;
  repeated Port outputs = 4;
  // Default work-unit policy for nodes using this capability. Declared at
  // module creation (Register). Run-level ExecutionPolicy may override.
  Firing firing = 5;
}

// A named, typed side of a capability. Multiple bindings are permitted only
// when `multiple` is true; an unbound input is permitted only when `optional`
// is true. These rules let the kernel determine readiness without parsing data.
//
// Typing is a **trait set**: `traits` lists contract refs. On an input port the
// artifact must *contain* every listed trait (superset OK). On an output port
// the module *guarantees* those traits will be present (may include more).
// Assembly binding: source guarantees ⊇ target requires. The kernel never
// parses trait bodies.
message Port {
  string name     = 1;
  // Removed: single contract ref. Use `traits` (field 6).
  reserved 2;
  reserved "contract";
  bool multiple   = 3;
  bool optional   = 4;
  // When true, this port participates in FIRING_ONCE_PER_KEY identity. The
  // kernel hashes artifact ids on key ports (never domain bodies). If no input
  // port is marked key, all inputs participate.
  bool key = 5;
  // Non-empty list of trait contract refs. Input: required. Output: guaranteed.
  // Order is insignificant; the kernel normalizes to a set for matching.
  repeated string traits = 6;
}

message ModuleManifest {
  string name              = 1;  // unique module id, kebab-case
  string version           = 2;  // semver
  repeated Capability provides = 3;
  // Availability dependencies only (boot/load hint). Run dataflow is expressed
  // exclusively by typed capability ports and Assembly bindings, never by this
  // list. The kernel does not gate LOADED or ClaimReady on requires.
  repeated string requires     = 4;
}

// ─── 2. ARTIFACT ───────────────────────────────────────────────────────────
// A content-addressed, IMMUTABLE **trait bundle** that flows between modules.
//
// A value is a map of contract ref → Trait (inline body or external ObjectRef).
// Traits travel together; consumers project the traits they need.
//
// Value identity (content address):
//
//   id = H( canonical_traits )
//   canonical_traits = for each contract_ref in UTF-8 ascending order:
//       contract_ref ‖ 0x00 ‖ trait_content ‖ 0x00
//   trait_content =
//       body                                           (inline)
//     | object_ref_bytes(object)                       (external)
//   object_ref_bytes = digest ‖ 0x00 ‖ uint64_be(byte_count) ‖ 0x00 ‖ namespace
//
// Blob identity is pure content: digest = "sha256:" + hex(sha256(data)).
//
// Exactly one of Trait.body or Trait.object carries each trait's value.
// Prefer inline for small payloads; place a verified ObjectRef for large blobs.
// The kernel never parses domain payload; trait *keys* are contract refs.
//
// Provenance is NOT on the Artifact: equal trait bags share one address while
// every distinct production path is recorded as a separate immutable Derivation.
// entity_id / supersedes / meta / produced_by are NOT part of value identity.

// Content-addressed blob. Digest is over raw bytes only (not type, not namespace).
message BlobRef {
  string digest     = 1;  // "sha256:" + hex(sha256(data))
  uint64 byte_count = 2;
  string namespace  = 3;  // storage namespace / tenancy; empty = default
}

// Verified external object reference. Same fields as BlobRef; named separately
// because it participates in typed Artifact value identity (via a Trait).
message ObjectRef {
  string digest     = 1;  // blob digest; must match stored bytes
  uint64 byte_count = 2;  // expected size; verified on put and get
  string namespace  = 3;  // which blob store namespace holds the bytes
}

// One contract-typed payload inside a trait bundle.
message Trait {
  // Small inline value. Must be empty when `object` is set.
  bytes body = 1;
  // Large external value: a verified ref to a blob. When digest is non-empty,
  // trait content hashes object_ref_bytes(object), not the blob bytes, and body
  // must be empty. The blob must already exist in `object.namespace`.
  ObjectRef object = 2;
}

message Artifact {
  string id                  = 1;  // content address, assigned by the kernel
  // Removed: single type + body/object. Use `traits` (field 8).
  reserved 2, 3, 7;
  reserved "type", "body", "object";
  map<string, string> meta   = 4;
  string produced_by         = 5;  // module name (not part of value id)
  reserved 6;
  reserved "derived_from";
  // Trait bag: key = contract ref. At least one entry required.
  map<string, Trait> traits  = 8;
  // Optional stable entity identity across enrichments (e.g. "file:abc").
  // NOT part of value identity — copy forward when merging traits.
  string entity_id           = 9;
  // Optional prior artifact id this value supersedes (lineage hint).
  // NOT part of value identity.
  string supersedes          = 10;
}

message ArtifactRef { string id = 1; }

// ─── Artifact / blob store law (frozen at KernelApi construction) ──────────
// Enforceable acceptance and durability guarantees for PutArtifact / PutBlob.
// Does NOT affect value identity formulas (trait body / object_ref_bytes).
// Physical layout (memory map, filesystem path, object storage) is a backend
// implementation detail — never part of this policy.

// How raw bytes enter the blob store. Strong default: always copy + verify.
enum BlobIngestMode {
  BLOB_INGEST_MODE_UNSPECIFIED  = 0;  // treat as COPY_VERIFY
  BLOB_INGEST_MODE_COPY_VERIFY  = 1;  // only supported strong mode (v2)
  // Future weak modes (e.g. path locators) require a new enum value + explicit
  // weaker guarantees — do not overload ObjectRef.
}

// Declared durability of this kernel's artifact + blob stores.
enum StoreDurability {
  STORE_DURABILITY_UNSPECIFIED = 0;  // treat as EPHEMERAL
  STORE_DURABILITY_EPHEMERAL   = 1;  // may vanish on process restart (MemoryKernel)
  STORE_DURABILITY_DURABLE     = 2;  // survives process restart (backend-specific)
}

// Frozen store law for one KernelApi instance. Construction normalises zeros
// and UNSPECIFIED enums to the defaults below. Every conforming backend MUST
// enforce the same accept/reject rules for the same policy.
//
// Defaults after normalisation:
//   max_inline_bytes = 1 MiB (when zero on input)
//   max_blob_bytes   = 0     (unlimited; zero stays zero)
//   ingest_mode      = COPY_VERIFY
//   durability       = EPHEMERAL
//
// Oversized Trait.body or PutBlob data → ERROR_CODE_RESOURCE_EXHAUSTED.
// Unsupported ingest_mode → ERROR_CODE_INVALID at construction (or put).
message ArtifactStorePolicy {
  // Hard max bytes for a single Trait.body. 0 on input → default 1 MiB.
  // Set to a very large value only when you intentionally allow huge inline.
  uint64 max_inline_bytes = 1;
  // Hard max bytes for a single PutBlob payload. 0 = unlimited.
  uint64 max_blob_bytes = 2;
  // Ingest semantics. Only COPY_VERIFY is supported in v2.
  BlobIngestMode ingest_mode = 3;
  // Declared durability class of this backend's stores.
  StoreDurability durability = 4;
}

// Blob store ABI (streaming-capable on the wire; in-process SDKs take full bytes).
// PutBlob COPIES bytes into the kernel blob store (ingest_mode COPY_VERIFY);
// it never retains a pointer to the caller's original path or buffer identity.
message PutBlobRequest {
  string namespace = 1;  // empty = default
  bytes  data      = 2;
}

message GetBlobRequest {
  string digest    = 1;
  string namespace = 2;
}

message BlobData {
  string digest     = 1;
  uint64 byte_count = 2;
  string namespace  = 3;
  bytes  data       = 4;
}

message HasBlobRequest {
  string digest    = 1;
  string namespace = 2;
}

message HasBlobResponse {
  bool   exists     = 1;
  uint64 byte_count = 2;
}

// ─── 3. CONTRACT ───────────────────────────────────────────────────────────
// The declarative schema that is the SOLE coupling point. Modules couple to a
// contract *identity*, never to each other's code. Each **trait key** on an
// Artifact and each entry in Port.traits names a contract ref.
//
// Identity & immutability:
//   • `ref` is the stable human name and the registry key.
//   • `digest` is the content address, assigned by the kernel:
//         digest = "sha256:" + hex(sha256(
//           media_type ‖ 0x00 ‖ schema ‖ 0x00 ‖ version ‖ 0x00 ‖
//           compatible_with… (UTF-8 ascending, each entry 0x00-delimited)
//         ))
//   • PutContract is immutable: first write of a ref wins. An identical re-put
//     is a no-op. A different content under the same ref is CONFLICT.
//   • Register may create an empty name-only placeholder for a ref named by a
//     port; that placeholder may be filled once via PutContract.
//
// Port.traits and Artifact.traits keys hold the ref. Event.type may name a ref
// for optional event typing. The kernel pins that ref to one digest.

message Contract {
  string ref         = 1;  // fully-qualified name, e.g. "acme.recon.v1.Host"
  string schema      = 2;  // schema text; may be empty for name-only placeholders
  // Schema language / media type, e.g. "text/x-protobuf",
  // "application/schema+json", "application/json". Empty only for placeholders.
  string media_type  = 3;
  string version     = 4;  // optional explicit version metadata (e.g. semver)
  string digest      = 5;  // content address; assigned by the kernel on put
  // Optional: other contract refs this one claims compatibility with. Advisory
  // only — does not rewrite or alias those refs. Sorted UTF-8 on registration.
  // Does NOT participate in trait set matching (structural inclusion does).
  repeated string compatible_with = 6;
}

// ─── 4. EVENT ──────────────────────────────────────────────────────────────
// A bus message. Modules publish to topics and subscribe to topics; they never
// call each other directly. `seq` is a total order assigned by the kernel.
// Artifact refs are the data plane — not event body bytes.

message Event {
  string id      = 1;
  string topic   = 2;  // dotted, e.g. "recon.host.found"
  string type    = 3;  // contract ref describing the event (optional typing)
  reserved 4;
  reserved "payload";
  string source  = 5;  // module name
  uint64 seq     = 6;  // kernel-assigned, monotonic
  string run_id  = 7;  // empty for events outside a bounded run
  // Artifact refs are the data plane. Convergent assemblies pass values only
  // through these immutable refs.
  repeated ArtifactRef artifacts = 8;
}

// ─── 5. LEDGER ─────────────────────────────────────────────────────────────
// An append-only, hash-chained, agent-observable record of everything the
// kernel did. Tamper-evident: each entry commits to the previous entry's hash.

message LedgerEntry {
  uint64 seq       = 1;
  string kind      = 2;  // "module.activated", "artifact.put", "event.published", …
  string subject   = 3;  // id of the thing this entry is about
  bytes  detail    = 4;  // canonical proto of one message, keyed by `kind` (see
                         // SPEC.md "Ledger detail"); large content already
                         // addressed by `subject` (trait body bytes, blob
                         // data) is cleared; verified ObjectRef / BlobRef
                         // metadata remains.
  string prev_hash = 5;  // hash of entry seq-1 ("" for genesis)
  string hash      = 6;  // sha256 over (seq, kind, subject, detail, prev_hash)
}

// ─── 6. REGISTRY ───────────────────────────────────────────────────────────
// Discovery: what modules, capabilities, and contracts exist right now.

message RegistrySnapshot {
  repeated ModuleManifest modules      = 1;
  repeated Capability      capabilities = 2;
  repeated Contract        contracts    = 3;
  // Frozen ArtifactStorePolicy for this kernel instance (normalised defaults).
  ArtifactStorePolicy store_policy     = 4;
}

// ─── 7. RUN / CONVERGENCE ──────────────────────────────────────────────────
// An Assembly is the small, human-owned feed-forward seam. It pins module
// versions, connects typed ports, and names exactly one terminal output. A Run
// applies input artifacts to one Assembly (optionally a node subset) under an
// ExecutionPolicy. Work units (not bare nodes) claim/commit at most once.
// Runs close only as COMPLETED, STALLED, FAILED, or CANCELLED; closed runs
// never reopen. Assemblies remain acyclic; multi-fire is time, not a cycle edge.

message NamedArtifact {
  string name         = 1;
  ArtifactRef artifact = 2;
}

message AssemblyNode {
  string id             = 1;
  string module         = 2;
  string module_version = 3;
  string capability     = 4;
}

// Exactly one source is set: (`from_node`, `from_port`) for an upstream output,
// or `input` for a named RunRequest input.
message Binding {
  string to_node   = 1;
  string to_port   = 2;
  string from_node = 3;
  string from_port = 4;
  string input     = 5;
}

message NodeOutput {
  string node = 1;
  string port = 2;
}

message Limits {
  // Zero means the number of nodes. A run never commits more derivations than
  // this value, which bounds multi-fire (ALWAYS / ONCE_PER_KEY) work units.
  uint64 max_steps = 1;
  // Max concurrently CLAIMED (leased) work units. Zero = unbounded.
  uint64 max_in_flight = 2;
  // Lease duration applied on ClaimReady / Heartbeat. Zero → SDK default (60s).
  uint64 default_lease_ms = 3;
  // Max claim attempts per work unit (including the first). Zero → SDK default (3).
  // After this many claims, expiry or retryable FailWork becomes terminal.
  uint32 max_attempts = 4;
}

// When a RUNNING run may become COMPLETED. Unspecified = FIRST_TERMINAL.
enum Closure {
  CLOSURE_UNSPECIFIED    = 0;
  CLOSURE_FIRST_TERMINAL = 1;  // terminal output → COMPLETED (v1.0 default)
  CLOSURE_OPEN           = 2;  // stay RUNNING until cancel / max_steps; no auto-stall
}

// Operator-owned run policy. Module Capability.firing is the default; by_node
// and default override when set (non-UNSPECIFIED).
message ExecutionPolicy {
  Firing default = 1;
  map<string, Firing> by_node = 2;  // assembly node id → firing
  Closure closure = 3;
}

message Assembly {
  string id                  = 1;
  repeated AssemblyNode nodes = 2;
  repeated Binding bindings   = 3;
  NodeOutput terminal         = 4;
}

enum RunState {
  RUN_STATE_UNSPECIFIED = 0;
  RUN_STATE_RUNNING     = 1;
  RUN_STATE_COMPLETED   = 2;
  RUN_STATE_STALLED     = 3;
  RUN_STATE_FAILED      = 4;
  RUN_STATE_CANCELLED   = 5;
}

message RunRequest {
  string id                    = 1;
  Assembly assembly            = 2;
  repeated NamedArtifact inputs = 3;
  Limits limits                = 4;
  // If non-empty, only these assembly node ids participate; others are dropped
  // and bindings that touch them are removed. Terminal must remain.
  repeated string include_nodes = 5;
  ExecutionPolicy policy        = 6;
}

message Run {
  string id                    = 1;
  Assembly assembly            = 2;
  repeated NamedArtifact inputs = 3;
  RunState state               = 4;
  ArtifactRef answer           = 5;
  uint64 steps                 = 6;
  uint64 max_steps             = 7;
  string reason                = 8;
  // Frozen at StartRun (after include_nodes materialisation).
  ExecutionPolicy policy       = 9;
}

message RunRef { string id = 1; }

// Replace or set a named run input while RUNNING. Bumps that input's delivery
// generation so FIRING_ALWAYS nodes bound to it can re-fire (including the same
// artifact id). The name must appear as Binding.input in the frozen assembly.
message InjectInputRequest {
  string run_id         = 1;
  NamedArtifact input   = 2;
}

// Claim one or more ready work units under a lease. Units are CLAIMED until
// Commit, FailWork, or lease expiry (then READY again unless attempts exhausted).
message ClaimRequest {
  string run_id = 1;
  // Soft filter: empty = any module; non-empty = only this module.
  // Prefer `modules` when filtering several names.
  string module = 2;
  // Soft filter: empty = any node; else only listed assembly node ids.
  repeated string node_ids = 3;
  // How many units to claim this call. Zero is treated as 1.
  uint32 max_items = 4;
  // Soft allow-list of module names. Empty = all (subject to `module` if set).
  // When both `module` and `modules` are set, the unit must match `module` and
  // appear in `modules` (typically leave one empty).
  repeated string modules = 5;
}

message ClaimResponse {
  // Claimed units (may be fewer than max_items). Empty = nothing ready or at
  // max_in_flight capacity.
  repeated WorkItem items = 1;
}

message WorkItem {
  string id                    = 1;
  string run_id                = 2;
  string node_id               = 3;
  string module                = 4;
  string module_version        = 5;
  string capability            = 6;
  repeated NamedArtifact inputs = 7;
  // Stable work-unit identity from firing policy (once: / key: / always: …).
  string unit_key = 8;
  // 1-based claim attempt for this unit_key within the run.
  uint32 attempt = 9;
  // Absolute lease deadline (unix epoch ms). Wall-clock; zeroed in ledger detail
  // so chain hashes stay deterministic across SDKs.
  int64 lease_until_unix_ms = 10;
}

// Extend leases on in-flight work (long execute). Lost ids were already expired
// or never claimed by this run.
message HeartbeatRequest {
  string run_id = 1;
  repeated string work_ids = 2;
  // Lease extension from now. Zero → run default_lease_ms.
  uint64 extend_lease_ms = 3;
}

message HeartbeatResponse {
  repeated string renewed_work_ids = 1;
  repeated string lost_work_ids = 2;
}

// Release a claimed unit without a derivation. terminal=true → unit DONE (no
// retry). terminal=false → READY again if attempts remain, else DONE.
message FailWorkRequest {
  string run_id = 1;
  string work_id = 2;
  string reason = 3;
  bool terminal = 4;
}

// Ledger detail for work.failed / terminal attempt exhaustion.
message WorkFailure {
  string run_id = 1;
  string work_id = 2;
  string unit_key = 3;
  string reason = 4;
  bool terminal = 5;
  uint32 attempt = 6;
}

// Provenance is separate from Artifact identity: equal trait bags converge to
// one Artifact while every distinct production path remains observable.
message Derivation {
  string id                     = 1;
  string run_id                 = 2;
  string work_id                = 3;
  string node_id                = 4;
  string module                 = 5;
  string module_version         = 6;
  string capability             = 7;
  repeated NamedArtifact inputs  = 8;
  repeated NamedArtifact outputs = 9;
}

message DerivationList { repeated Derivation derivations = 1; }

// ─── ABI ENVELOPE: request context & portable errors ───────────────────────
// Cross-cutting shapes every SDK shares. Neither belongs to a primitive.
//
// RequestContext rides as call metadata — gRPC headers over the wire, a
// parameter in-process — so retry-safety, deadlines and tracing have ONE clean,
// add-only home instead of leaking into each RPC's domain message. It is
// deliberately kept OUT of the hash-chained ledger detail: the canonical chain
// records WHAT happened to state, not who asked; folding a caller or trace id
// into the hash would make identical histories diverge.
//
// Semantics the kernel enforces on every call that accepts RequestContext:
//   • deadline_unix_ms > 0 and now past that instant → FAILED_PRECONDITION
//   • non-empty request_key on PutArtifact / StartRun / Commit: first success
//     for (caller, request_key, operation) is cached; later identical keys
//     return the same response without re-applying side effects
//
// There is no kernel-level authorisation: systems built on this core are
// trusted. `caller` is observational only (audit / routing hints / idempotency
// scope), never an access-control principal.
message RequestContext {
  string caller           = 1;  // module or process identity making the call
  string request_key      = 2;  // idempotency key; non-empty ⇒ de-duplicate
                                // PutArtifact / StartRun / Commit by
                                // (caller, request_key, operation)
  int64  deadline_unix_ms = 3;  // absolute deadline, unix epoch ms; 0 = none
  string correlation_id   = 4;  // trace ref linking related calls
}

// A portable failure. Every SDK — in-process or gRPC, Rust/Go/Python — maps its
// native error (Result/error/exception) into exactly this shape, so failure
// semantics are identical across languages and across the wire. Retryability is
// explicit so callers never guess whether re-issuing a call is safe.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED         = 0;
  ERROR_CODE_NOT_FOUND           = 1;  // no such artifact / blob / run
  ERROR_CODE_INVALID             = 2;  // malformed request, manifest, or assembly
  ERROR_CODE_CONFLICT            = 3;  // id exists / work already claimed
  ERROR_CODE_FAILED_PRECONDITION = 4;  // run closed / deadline exceeded / other
  ERROR_CODE_RESOURCE_EXHAUSTED  = 5;  // bounded buffer full, or store size limit hit
  ERROR_CODE_BLOB_INTEGRITY      = 6;  // stored bytes do not match digest/size
}

message Error {
  ErrorCode code                = 1;
  string    message             = 2;  // human-readable detail
  bool      retryable           = 3;  // true ⇒ the same call may succeed later
  string    conflict_subject    = 4;  // for CONFLICT: the id in contention
  string    failed_precondition = 5;  // for FAILED_PRECONDITION: what was unmet
}

// ─── KERNEL ABI ─────────────────────────────────────────────────────────────
// The seam every SDK implements. Rust, Go, and Python each realise it IN-PROCESS
// today (methods mirroring these RPCs). This service definition is the canonical
// WIRE ABI for the day a cross-process SDK is needed.
//
// Every RPC additionally receives a RequestContext (as call metadata, not shown
// in these signatures) and reports failure as a portable Error. In-process SDKs
// surface the same two shapes: an optional RequestContext parameter and an
// error type that maps one-to-one onto Error.

message RegisterAck   { Lifecycle state = 1; }
message PublishAck    { uint64 seq = 1; }
message Subscription  { string module = 1; repeated string topics = 2; }
message SnapshotRequest {}
message AppendRequest { string kind = 1; string subject = 2; bytes detail = 3; }

// Advance a module along REGISTERED → LOADED → ACTIVE → DEACTIVATED.
// Only a single forward step is applied; other targets leave state unchanged.
message TransitionRequest {
  string    module = 1;
  Lifecycle to     = 2;
}
message TransitionAck {
  Lifecycle state = 1;
}

service Kernel {
  rpc Register    (ModuleManifest)  returns (RegisterAck);
  // Advance module lifecycle by one legal step. Part of the Module primitive.
  rpc Transition  (TransitionRequest) returns (TransitionAck);
  rpc PutArtifact (Artifact)        returns (ArtifactRef);
  rpc GetArtifact (ArtifactRef)     returns (Artifact);
  // Content-addressed blob store: large opaque bytes live here; Artifacts
  // hold verified ObjectRefs on individual traits.
  rpc PutBlob     (PutBlobRequest)  returns (BlobRef);
  rpc GetBlob     (GetBlobRequest)  returns (BlobData);
  rpc HasBlob     (HasBlobRequest)  returns (HasBlobResponse);
  // Immutable contract registration. Returns the stored Contract (digest set).
  // CONFLICT when the same ref is re-registered with different content.
  rpc PutContract (Contract)        returns (Contract);
  rpc Publish     (Event)           returns (PublishAck);
  rpc Subscribe   (Subscription)    returns (stream Event);
  rpc Append      (AppendRequest)   returns (LedgerEntry);
  rpc Snapshot    (SnapshotRequest) returns (RegistrySnapshot);
  rpc StartRun    (RunRequest)      returns (Run);
  // Admit or replace a named input on a RUNNING run (open / multi-fire modes).
  rpc InjectInput (InjectInputRequest) returns (Run);
  // Claim up to max_items ready units under leases. Empty items = none ready.
  rpc ClaimReady  (ClaimRequest)    returns (ClaimResponse);
  // Renew leases on claimed work (long-running execute).
  rpc Heartbeat   (HeartbeatRequest) returns (HeartbeatResponse);
  // Fail a claimed unit: retry (READY) or terminal (DONE).
  rpc FailWork    (FailWorkRequest) returns (Run);
  rpc Commit      (Derivation)      returns (Run);
  rpc GetRun      (RunRef)          returns (Run);
  rpc CancelRun   (RunRef)          returns (Run);
  rpc ListDerivations (RunRef)      returns (DerivationList);
}
