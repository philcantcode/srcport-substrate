name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The kernel contract is law: it must lint, it may only evolve by addition, and
  # the committed SDK codegen must match it exactly (no drift).
  contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kernel
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # buf breaking needs main's history
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.50.0
      - name: Lint the contract
        run: buf lint
      # v0.x is unfrozen and may change shape (Gate was removed entirely). At
      # the v1.0.0 freeze this check becomes mandatory and non-skippable.
      - name: Evolve by addition only (enforced at freeze)
        run: |
          echo "Spec is unfrozen (v0.x); skipping buf breaking against main."
          echo "Re-enable: buf breaking --against '.git#branch=main'"
      - name: SDK codegen is in lockstep with the contract
        run: |
          bash scripts/gen.sh
          if ! git diff --quiet; then
            echo "::error::Generated code is stale. Run kernel/scripts/gen.sh and commit the result."
            git --no-pager diff --stat
            exit 1
          fi

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Kernel SDK tests (types generated from proto by build.rs)
        run: cargo test --manifest-path kernel/sdk/rust/Cargo.toml
      - name: Kernel SDK clippy
        run: cargo clippy --manifest-path kernel/sdk/rust/Cargo.toml --all-targets -- -D warnings
      # The example is a downstream consumer of the SDK's public ABI: build and
      # lint it too, so a contract change that breaks real usage fails CI here.
      - name: Kernel example builds and runs on the public ABI
        run: |
          cargo clippy --manifest-path kernel/example/Cargo.toml --all-targets -- -D warnings
          cargo run --manifest-path kernel/example/Cargo.toml
      # Framework sits on the public ABI only; kernel must not import it.
      - name: Framework tests and clippy
        run: |
          cargo test --manifest-path framework/rust/Cargo.toml
          cargo clippy --manifest-path framework/rust/Cargo.toml --all-targets -- -D warnings

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Vet
        run: go vet ./...
        working-directory: kernel/sdk/go
      - name: Test
        run: go test ./...
        working-directory: kernel/sdk/go

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the SDK
        run: pip install ./kernel/sdk/python
      - name: Conformance suite
        run: python -m unittest discover -s kernel/sdk/python/tests -v
